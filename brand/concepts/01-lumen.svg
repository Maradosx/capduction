<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Capduction — Lumen mark">
  <defs>
    <linearGradient id="lum-ring-1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="55%" stop-color="#F0ABFC"/>
      <stop offset="100%" stop-color="#FBA98C"/>
    </linearGradient>
    <linearGradient id="lum-ring-2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6EE7C7"/>
      <stop offset="50%" stop-color="#93C5FD"/>
      <stop offset="100%" stop-color="#C4B5FD"/>
    </linearGradient>
    <linearGradient id="lum-ring-3" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#FB7185"/>
      <stop offset="100%" stop-color="#F0ABFC"/>
    </linearGradient>
    <radialGradient id="lum-core" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="55%" stop-color="#FFE9C9" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#FBA98C" stop-opacity="0.9"/>
    </radialGradient>
  </defs>
  <!-- outer pulse rings -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="url(#lum-ring-3)" stroke-width="1.2" opacity="0.55"/>
  <circle cx="32" cy="32" r="22" fill="none" stroke="url(#lum-ring-2)" stroke-width="1.6" opacity="0.75"/>
  <circle cx="32" cy="32" r="16" fill="none" stroke="url(#lum-ring-1)" stroke-width="2.2" opacity="0.92"/>
  <!-- core orb -->
  <circle cx="32" cy="32" r="9" fill="url(#lum-core)"/>
  <!-- highlight spec -->
  <circle cx="29" cy="29" r="2.4" fill="#FFFFFF" opacity="0.9"/>
</svg>
