    <ellipse cx="0" cy="-13" rx="8" ry="15" fill="url(#bl-pet-2)" opacity="0.78" transform="rotate(60)"/>
    <ellipse cx="0" cy="-13" rx="8" ry="15" fill="url(#bl-pet-3)" opacity="0.78" transform="rotate(120)"/>
    <ellipse cx="0" cy="-13" rx="8" ry="15" fill="url(#bl-pet-1)" opacity="0.78" transform="rotate(180)"/>
    <ellipse cx="0" cy="-13" rx="8" ry="15" fill="url(#bl-pet-2)" opacity="0.78" transform="rotate(240)"/>
    <ellipse cx="0" cy="-13" rx="8" ry="15" fill="url(#bl-pet-3)" opacity="0.78" transform="rotate(300)"/>
  </g>
  <!-- bright center -->
  <circle cx="32" cy="32" r="6" fill="url(#bl-core)"/>
  <!-- play hint -->
