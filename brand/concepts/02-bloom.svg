<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Capduction — Bloom mark">
  <defs>
    <linearGradient id="bl-pet-1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="100%" stop-color="#F0ABFC"/>
    </linearGradient>
    <linearGradient id="bl-pet-2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBA98C"/>
      <stop offset="100%" stop-color="#FB7185"/>
    </linearGradient>
    <linearGradient id="bl-pet-3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6EE7C7"/>
      <stop offset="100%" stop-color="#93C5FD"/>
    </linearGradient>
    <radialGradient id="bl-core" cx="40%" cy="35%" r="70%">
